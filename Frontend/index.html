<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Pedidos</title>
  
  <!-- Tailwind vía CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

  <div class="max-w-3xl mx-auto space-y-8">

    <!-- Encabezado -->
    <header class="text-center">
      <h1 class="text-3xl font-bold text-green-600">Gestión de Pedidos</h1>
      <p class="text-gray-600">Ingreso manual y vista general</p>
    </header>

    <!-- Formulario -->
    <section class="bg-white shadow rounded-lg p-6">
      <h2 class="text-xl font-semibold mb-4">Ingresar Pedido</h2>
      <form id="pedidoForm" class="space-y-4">
        
        <!-- Producto -->
        <div>
          <label class="block mb-1 font-medium">Nombre del Producto *</label>
          <input type="text" name="producto" required 
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Cantidad -->
        <div>
          <label class="block mb-1 font-medium">Cantidad *</label>
          <input type="number" name="cantidad" min="1" required
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Cliente -->
        <div>
          <label class="block mb-1 font-medium">Nombre Cliente *</label>
          <input type="text" name="cliente" required
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Fecha -->
        <div>
          <label class="block mb-1 font-medium">Fecha de Entrega *</label>
          <input type="date" name="fecha" required
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Email -->
        <div>
          <label class="block mb-1 font-medium">Correo Electrónico (opcional)</label>
          <input type="email" name="email"
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Etiquetas -->
        <div>
          <label class="block mb-1 font-medium">Etiquetas</label>
          <input type="text" name="etiquetas" placeholder="Ej: urgente, madera"
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Botón -->
        <button type="submit" 
                class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
          Guardar Pedido
        </button>
      </form>
    </section>

    <!-- Vista General -->
    <section class="bg-white shadow rounded-lg p-6">
      <h2 class="text-xl font-semibold mb-4">Vista General de Pedidos</h2>
      <ul id="listaPedidos" class="space-y-3 text-gray-700">
        <li class="text-gray-400 italic">Aún no hay pedidos ingresados.</li>
      </ul>
    </section>

  </div>

  <!-- Script para simular pedidos -->
  <script>
    const form = document.getElementById('pedidoForm');
    const listaPedidos = document.getElementById('listaPedidos');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Obtener datos
      const producto = form.producto.value.trim();
      const cantidad = form.cantidad.value.trim();
      const cliente = form.cliente.value.trim();
      const fecha = form.fecha.value;
      const email = form.email.value.trim();
      const etiquetas = form.etiquetas.value.trim();

      // Validación básica
      if (!producto || !cantidad || !cliente || !fecha) {
        alert("Por favor complete todos los campos obligatorios.");
        return;
      }

      // Crear item
      const li = document.createElement('li');
      li.className = "p-3 border rounded bg-gray-50";

      li.innerHTML = `
        <p><span class="font-semibold">Producto:</span> ${producto}</p>
        <p><span class="font-semibold">Cantidad:</span> ${cantidad}</p>
        <p><span class="font-semibold">Cliente:</span> ${cliente}</p>
        <p><span class="font-semibold">Entrega:</span> ${fecha}</p>
        ${email ? `<p><span class="font-semibold">Email:</span> ${email}</p>` : ""}
        ${etiquetas ? `<p><span class="font-semibold">Etiquetas:</span> ${etiquetas}</p>` : ""}
      `;

      // Si es el primer pedido, limpiamos placeholder
      if (listaPedidos.firstElementChild && listaPedidos.firstElementChild.classList.contains("italic")) {
        listaPedidos.innerHTML = "";
      }

      listaPedidos.appendChild(li);

      // Resetear form
      form.reset();
    });
  </script>

</body>
</html>
