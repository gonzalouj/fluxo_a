<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script src="auth.js"></script>
    <script>
      // Proteger página - solo Admin puede crear pedidos
      if (typeof protegerPagina === "function") {
        protegerPagina(["Admin"]);
      }
    </script>
    <script src="push-subscription.js"></script>
    <script src="push-ui.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingreso de Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Paleta empresarial moderna */
      :root {
        --primary-blue: #1e40af;
        --primary-blue-light: #3b82f6;
        --success-green: #059669;
        --success-green-light: #10b981;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-600: #475569;
        --gray-700: #334155;
        --gray-800: #1e293b;
        --gray-900: #0f172a;
      }

      .enterprise-bg {
        background: linear-gradient(135deg, var(--gray-50) 0%, #ffffff 100%);
      }

      /* Inputs profesionales */
      .professional-input {
        background: white;
        border: 1px solid var(--gray-200);
        transition: all 0.2s ease;
      }

      .professional-input:focus {
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.05);
        outline: none;
      }

      /* Resultados de búsqueda que aparecen DEBAJO */
      .search-results {
        position: static; /* Cambiado de absolute a static */
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid var(--gray-200);
        border-radius: 8px;
        background: white;
        margin-top: 8px;
      }

      .product-item {
        transition: all 0.15s ease;
      }

      .product-item:hover {
        background-color: var(--gray-50);
        border-left: 3px solid var(--primary-blue);
      }

      .selected-product {
        background: white;
        border: 1px solid var(--gray-200);
        border-left: 4px solid var(--primary-blue);
      }

      .selected-product:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* Botón principal empresarial verde */
      .btn-enterprise {
        background: var(--success-green);
        transition: all 0.2s ease;
      }

      .btn-enterprise:hover {
        background: #047857;
        box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
      }

      /* Botón secundario */
      .btn-secondary {
        background: var(--gray-600);
        transition: all 0.2s ease;
      }

      .btn-secondary:hover {
        background: var(--gray-700);
      }

      /* Sombras empresariales */
      .shadow-enterprise {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .shadow-subtle {
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1),
          0 1px 2px 0 rgba(0, 0, 0, 0.06);
      }

      /* Títulos profesionales */
      .title-enterprise {
        color: var(--gray-800);
        font-weight: 600;
      }

      .label-enterprise {
        color: var(--gray-700);
        font-weight: 500;
      }

      /* Animación sutil */
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="enterprise-bg min-h-screen">
    <div id="toast-container" class="fixed top-5 right-5 z-50"></div>
    <div id="menu-placeholder"></div>
    <div id="header-placeholder"></div>

    <!-- Modal para agregar producto -->
    <div
      id="product-modal"
      class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-lg shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto"
      >
        <div
          class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center"
        >
          <h2 class="text-2xl font-bold text-gray-800">
            Agregar Producto al Catálogo
          </h2>
          <button
            type="button"
            id="close-modal"
            class="text-gray-500 hover:text-gray-700"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>

        <form id="product-form" class="p-6 space-y-6">
          <!-- Información Básica -->
          <div class="space-y-4">
            <h3 class="text-lg font-semibold text-gray-700 border-b pb-2">
              Información Básica
            </h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Código</label
                >
                <input
                  type="text"
                  id="prod-codigo"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="Ej: SS2"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Nombre *</label
                >
                <input
                  type="text"
                  id="prod-nombre"
                  required
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="Ej: Silla Simple"
                />
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1"
                >Descripción</label
              >
              <textarea
                id="prod-descripcion"
                rows="2"
                class="w-full px-3 py-2 professional-input rounded-lg resize-none text-sm"
                placeholder="Descripción del producto..."
              ></textarea>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <div class="flex items-center justify-between mb-1">
                  <label class="block text-sm font-medium text-gray-600"
                    >Categoría</label
                  >
                  <button
                    type="button"
                    id="toggle-nueva-categoria"
                    class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1"
                    title="Agregar nueva categoría"
                  >
                    <svg
                      class="w-4 h-4"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M12 4v16m8-8H4"
                      ></path>
                    </svg>
                    Nueva
                  </button>
                </div>
                <select
                  id="prod-categoria"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                >
                  <option value="">Sin categoría</option>
                  <!-- Categorías se cargarán dinámicamente -->
                </select>

                <!-- Input para nueva categoría (oculto por defecto) -->
                <div
                  id="nueva-categoria-container"
                  class="hidden mt-2 p-3 bg-blue-50 rounded-lg border border-blue-200"
                >
                  <label class="block text-sm font-medium text-gray-700 mb-1">
                    Nueva Categoría
                  </label>
                  <div class="flex gap-2">
                    <input
                      type="text"
                      id="nueva-categoria-input"
                      placeholder="Ej: Bancos"
                      class="flex-1 px-3 py-2 professional-input rounded-lg text-sm"
                    />
                    <button
                      type="button"
                      id="guardar-categoria"
                      class="px-3 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium"
                      title="Guardar categoría"
                    >
                      ✓
                    </button>
                    <button
                      type="button"
                      id="cancelar-categoria"
                      class="px-3 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500 text-sm font-medium"
                      title="Cancelar"
                    >
                      ✕
                    </button>
                  </div>
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Material</label
                >
                <input
                  type="text"
                  id="prod-material"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="Ej: Plástico 100% reciclado"
                />
              </div>
            </div>
          </div>

          <!-- Dimensiones -->
          <div class="space-y-4">
            <h3 class="text-lg font-semibold text-gray-700 border-b pb-2">
              Dimensiones (cm)
            </h3>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Largo</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-largo"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Ancho</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-ancho"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Alto</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-alto"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Diámetro</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-diametro"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Fondo</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-fondo"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Alt. Asiento</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-altura-asiento"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Alt. Cubierta</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-altura-cubierta"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Peso (kg)</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-peso"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
            </div>
          </div>

          <!-- Precio y Stock -->
          <div class="space-y-4">
            <h3 class="text-lg font-semibold text-gray-700 border-b pb-2">
              Precio y Stock
            </h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Precio Unitario</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="prod-precio"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Moneda</label
                >
                <select
                  id="prod-moneda"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                >
                  <option value="CLP">CLP</option>
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Stock</label
                >
                <input
                  type="number"
                  id="prod-stock"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="0"
                />
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1"
                  >Unidad de Venta</label
                >
                <input
                  type="text"
                  id="prod-unidad"
                  class="w-full px-3 py-2 professional-input rounded-lg text-sm"
                  placeholder="Ej: unidad"
                  value="unidad"
                />
              </div>
              <div class="space-y-2">
                <label class="flex items-center gap-2">
                  <input
                    type="checkbox"
                    id="prod-incluye-iva"
                    checked
                    class="rounded border-gray-300"
                  />
                  <span class="text-sm font-medium text-gray-600"
                    >Incluye IVA</span
                  >
                </label>
                <label class="flex items-center gap-2">
                  <input
                    type="checkbox"
                    id="prod-requiere-presupuesto"
                    class="rounded border-gray-300"
                  />
                  <span class="text-sm font-medium text-gray-600"
                    >Requiere Presupuesto</span
                  >
                </label>
              </div>
            </div>
          </div>

          <!-- Información Adicional -->
          <div class="space-y-4">
            <h3 class="text-lg font-semibold text-gray-700 border-b pb-2">
              Información Adicional
            </h3>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1"
                >Notas Especiales</label
              >
              <textarea
                id="prod-notas"
                rows="2"
                class="w-full px-3 py-2 professional-input rounded-lg resize-none text-sm"
                placeholder="Notas adicionales del producto..."
              ></textarea>
            </div>
          </div>

          <!-- Tipo de Agregado -->
          <div
            class="space-y-4 bg-blue-50 p-4 rounded-lg border border-blue-200"
          >
            <h3 class="text-lg font-semibold text-blue-800">
              Tipo de Agregado
            </h3>
            <div class="space-y-2">
              <label class="flex items-start gap-3 cursor-pointer">
                <input
                  type="radio"
                  name="tipo-agregado"
                  value="permanente"
                  checked
                  class="mt-1"
                />
                <div>
                  <div class="font-medium text-gray-800">
                    📦 Permanente (Agregar al Catálogo)
                  </div>
                  <div class="text-sm text-gray-600">
                    El producto se agregará al catálogo y estará disponible para
                    futuros pedidos
                  </div>
                </div>
              </label>
              <label class="flex items-start gap-3 cursor-pointer">
                <input
                  type="radio"
                  name="tipo-agregado"
                  value="temporal"
                  class="mt-1"
                />
                <div>
                  <div class="font-medium text-gray-800">
                    ⏱️ Temporal (Solo este pedido)
                  </div>
                  <div class="text-sm text-gray-600">
                    El producto solo se usará en este pedido. Se eliminará
                    automáticamente si el pedido es eliminado.
                  </div>
                </div>
              </label>
            </div>
          </div>

          <!-- Botones -->
          <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t">
            <button
              type="button"
              id="cancel-product"
              class="flex-1 px-6 py-3 btn-secondary text-white rounded-lg font-semibold"
            >
              Cancelar
            </button>
            <button
              type="submit"
              id="save-product"
              class="flex-1 px-6 py-3 btn-enterprise text-white rounded-lg font-semibold flex items-center justify-center gap-2"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5 13l4 4L19 7"
                ></path>
              </svg>
              <span>Agregar al Catálogo</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <main class="max-w-4xl mx-auto py-8 px-4">
      <div
        class="bg-white rounded-lg shadow-enterprise border border-gray-200 fade-in"
      >
        <form id="pedidoForm" class="p-6 space-y-6">
          <!-- Sección Productos -->
          <div class="space-y-4">
            <label class="block text-lg label-enterprise">Productos</label>
            <div>
              <div class="flex flex-wrap items-center gap-2">
                <input
                  type="text"
                  id="product-search"
                  placeholder="Buscar por nombre o código..."
                  class="flex-1 min-w-[200px] px-4 py-3 professional-input rounded-lg"
                />
                <button
                  type="button"
                  id="toggle-product-list"
                  class="px-4 py-3 btn-secondary text-white rounded-lg hover:shadow-subtle shrink-0"
                  title="Mostrar todos los productos"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 9l-7 7-7-7"
                    ></path>
                  </svg>
                </button>
                <button
                  type="button"
                  id="add-product-btn"
                  class="px-4 py-3 btn-enterprise text-white rounded-lg hover:shadow-subtle flex items-center gap-2 shrink-0"
                  title="Agregar nuevo producto al catálogo"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 4v16m8-8H4"
                    ></path>
                  </svg>
                  <span class="hidden sm:inline">Nuevo</span>
                </button>
              </div>
              <div id="search-results" class="search-results hidden">
                <!-- Resultados de búsqueda se mostrarán aquí -->
              </div>
            </div>
            <div id="selected-products" class="space-y-3 pt-4">
              <!-- Productos seleccionados se añadirán aquí -->
            </div>
          </div>

          <!-- Sección Cliente -->
          <div class="space-y-4">
            <label class="block text-lg label-enterprise">Cliente</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label
                  for="cliente"
                  class="block text-sm font-medium text-gray-600 mb-1"
                  >Nombre Cliente *</label
                >
                <input
                  type="text"
                  name="cliente"
                  id="cliente"
                  required
                  class="w-full px-4 py-3 professional-input rounded-lg"
                />
              </div>
              <div>
                <label
                  for="fecha"
                  class="block text-sm font-medium text-gray-600 mb-1"
                  >Fecha de Entrega *</label
                >
                <input
                  type="date"
                  name="fecha"
                  id="fecha"
                  required
                  class="w-full px-4 py-3 professional-input rounded-lg"
                />
              </div>
              <div>
                <label
                  for="email"
                  class="block text-sm font-medium text-gray-600 mb-1"
                  >Email (opcional)</label
                >
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="w-full px-4 py-3 professional-input rounded-lg"
                />
              </div>
              <div>
                <label
                  for="telefono"
                  class="block text-sm font-medium text-gray-600 mb-1"
                  >Teléfono (opcional)</label
                >
                <input
                  type="text"
                  name="telefono"
                  id="telefono"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  class="w-full px-4 py-3 professional-input rounded-lg"
                />
                <p
                  id="telefono-warning"
                  class="text-xs text-red-500 mt-1 hidden"
                >
                  Solo se admiten números.
                </p>
              </div>
            </div>
          </div>

          <!-- Sección Detalles Adicionales -->
          <div class="space-y-4">
            <label class="block text-lg label-enterprise"
              >Detalles Adicionales</label
            >
            <div>
              <label
                for="etiquetas"
                class="block text-sm font-medium text-gray-600 mb-1"
                >Etiquetas (separadas por coma)</label
              >
              <input
                type="text"
                name="etiquetas"
                id="etiquetas"
                placeholder="Ej: Urgente, Despacho, Diseño especial"
                class="w-full px-4 py-3 professional-input rounded-lg"
              />
            </div>
            <div>
              <label
                for="comentarios"
                class="block text-sm font-medium text-gray-600 mb-1"
                >Comentario Inicial (opcional)</label
              >
              <textarea
                name="comentarios"
                id="comentarios"
                rows="3"
                placeholder="Añadir un comentario sobre el pedido..."
                class="w-full px-4 py-3 professional-input rounded-lg resize-none"
              ></textarea>
            </div>
          </div>

          <div class="pt-6 border-t border-gray-200">
            <button
              type="submit"
              id="submitBtn"
              class="w-full flex justify-center items-center gap-3 px-6 py-3 btn-enterprise text-white font-semibold rounded-lg focus:outline-none focus:ring-4 focus:ring-green-200"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5 13l4 4L19 7"
                ></path>
              </svg>
              <span id="submitText">Crear Pedido</span>
              <div
                id="submitSpinner"
                class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"
              ></div>
            </button>
          </div>
        </form>
      </div>
    </main>

    <script>
      // ESTADO GLOBAL
      // Detect if the current origin is NOT the Go backend (e.g., when served by VS Code Live Server on port 5500)
      const API_BASE = window.location.port === "8080" ? "/api" : "/api";
      let allProducts = [];
      let selectedProducts = [];
      let allCategories = [];
      let productosTemporalesPendientes = []; // Productos temporales que se guardarán con el pedido

      // --- RENDERIZADO ---
      function renderSelectedProducts() {
        const container = document.getElementById("selected-products");
        if (selectedProducts.length === 0) {
          container.innerHTML =
            '<p class="text-sm text-gray-500 italic text-center">Aún no has añadido productos.</p>';
          return;
        }
        container.innerHTML = selectedProducts
          .map(
            (p) => `
            <div class="selected-product p-4 rounded-lg flex items-center gap-3">
                <div class="flex-1 min-w-0">
                    <p class="font-semibold text-gray-800 break-words">
                      ${p.nombre}
                      ${
                        p.es_temporal_pendiente
                          ? '<span class="ml-2 px-2 py-0.5 bg-yellow-100 text-yellow-800 text-xs rounded-full whitespace-nowrap">⏱️ Temporal</span>'
                          : ""
                      }
                    </p>
          </div>
                <div class="flex items-center gap-2 shrink-0">
                    <label for="cantidad-${
                      p.id_producto
                    }" class="text-sm font-medium whitespace-nowrap">Cant:</label>
                    <input type="number" id="cantidad-${
                      p.id_producto
                    }" value="${
              p.cantidad
            }" min="1" onchange="updateQuantity('${
              p.id_producto
            }', this.value)" class="w-20 text-center bg-white border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
          </div>
                <button type="button" onclick="removeProduct('${
                  p.id_producto
                }')" class="shrink-0 p-1 text-red-500 hover:text-red-700 hover:bg-red-100 rounded-full transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
          </button>
        </div>
        `
          )
          .join("");
      }

      function renderSearchResults(products) {
        const resultsContainer = document.getElementById("search-results");
        resultsContainer.classList.remove("hidden");
        if (products.length === 0) {
          resultsContainer.innerHTML =
            '<p class="p-4 text-sm text-gray-500">No se encontraron productos.</p>';
          return;
        }
        resultsContainer.innerHTML = products
          .map(
            (p) => `
            <div onclick="selectProduct(${
              p.id_producto
            })" class="product-item px-4 py-3 cursor-pointer border-b border-gray-200 last:border-b-0">
                <p class="font-medium text-gray-800">${p.nombre}</p>
                <p class="text-sm text-gray-500">${p.codigo || "Sin código"}</p>
            </div>
        `
          )
          .join("");
      }

      // --- LÓGICA DE PRODUCTOS ---
      function selectProduct(productId) {
        if (selectedProducts.some((p) => p.id_producto === productId)) {
          showToast("ℹ️ Este producto ya está en la lista del pedido.", "info");
          return;
        }
        const product = allProducts.find((p) => p.id_producto === productId);
        if (product) {
          selectedProducts.push({ ...product, cantidad: 1 });
          renderSelectedProducts();
          document.getElementById("product-search").value = "";
          document.getElementById("search-results").classList.add("hidden");
        }
      }

      function removeProduct(productId) {
        // Convertir a string para comparación consistente (IDs numéricos y temporales)
        const idStr = String(productId);
        selectedProducts = selectedProducts.filter(
          (p) => String(p.id_producto) !== idStr
        );
        renderSelectedProducts();
      }

      function updateQuantity(productId, newQuantity) {
        const quantity = parseInt(newQuantity, 10);
        if (isNaN(quantity) || quantity < 1) {
          const input = document.getElementById(`cantidad-${productId}`);
          if (input) input.value = 1;
          const product = selectedProducts.find(
            (p) => p.id_producto === productId
          );
          if (product) product.cantidad = 1;
          return;
        }
        const product = selectedProducts.find(
          (p) => p.id_producto === productId
        );
        if (product) {
          product.cantidad = quantity;
        }
      }

      // --- CARGA INICIAL ---
      async function cargarProductos() {
        try {
          const response = await fetch(`${API_BASE}/productos`);
          if (!response.ok)
            throw new Error(
              "No se pudieron cargar los productos. Por favor, verifica tu conexión."
            );
          const data = await response.json();
          allProducts = data.productos || [];
        } catch (error) {
          console.error("Error al cargar productos:", error);
          showToast("❌ " + error.message, "error");
        }
      }

      async function cargarCategorias() {
        try {
          const response = await fetch(`${API_BASE}/categorias`);
          if (!response.ok)
            throw new Error(
              "No se pudieron cargar las categorías desde el servidor"
            );
          const data = await response.json();
          allCategories = data.categorias || [];

          // Llenar el select de categorías
          const selectCategoria = document.getElementById("prod-categoria");
          selectCategoria.innerHTML = '<option value="">Sin categoría</option>';
          allCategories.forEach((cat) => {
            const option = document.createElement("option");
            option.value = cat.id_categoria;
            option.textContent = cat.nombre;
            selectCategoria.appendChild(option);
          });
        } catch (error) {
          console.error("Error al cargar categorías:", error);
          // No mostramos toast aquí porque es menos crítico
        }
      }

      // --- FUNCIONES PARA NUEVA CATEGORÍA ---
      function mostrarNuevaCategoria() {
        const container = document.getElementById("nueva-categoria-container");
        const input = document.getElementById("nueva-categoria-input");
        const select = document.getElementById("prod-categoria");

        container.classList.remove("hidden");
        select.classList.add("opacity-50", "pointer-events-none");
        input.focus();
      }

      function ocultarNuevaCategoria() {
        const container = document.getElementById("nueva-categoria-container");
        const input = document.getElementById("nueva-categoria-input");
        const select = document.getElementById("prod-categoria");

        container.classList.add("hidden");
        select.classList.remove("opacity-50", "pointer-events-none");
        input.value = "";
      }

      async function guardarNuevaCategoria() {
        const input = document.getElementById("nueva-categoria-input");
        const nombreCategoria = input.value.trim();

        if (!nombreCategoria) {
          showToast(
            "📝 El nombre de la categoría es obligatorio",
            "error",
            3000
          );
          input.focus();
          return;
        }

        const guardarBtn = document.getElementById("guardar-categoria");
        const originalText = guardarBtn.innerHTML;
        guardarBtn.disabled = true;
        guardarBtn.innerHTML =
          '<div class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent mx-auto"></div>';

        try {
          const response = await fetch(`${API_BASE}/categorias`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre: nombreCategoria }),
          });

          const result = await response.json();

          if (!response.ok) {
            let errorMessage = result.error || "Error al crear la categoría";

            if (result.code === "DUPLICATE_NAME") {
              errorMessage = "⚠️ " + errorMessage;
            } else {
              errorMessage = "❌ " + errorMessage;
            }

            throw new Error(errorMessage);
          }

          // Éxito
          showToast(
            `Categoría "${nombreCategoria}" creada exitosamente`,
            "success",
            3000
          );

          // Recargar categorías
          await cargarCategorias();

          // Seleccionar la nueva categoría automáticamente
          const select = document.getElementById("prod-categoria");
          select.value = result.categoria_id;

          // Ocultar el formulario
          ocultarNuevaCategoria();
        } catch (error) {
          console.error("Error al crear categoría:", error);
          showToast(error.message, "error", 4000);
        } finally {
          guardarBtn.disabled = false;
          guardarBtn.innerHTML = originalText;
        }
      }

      // --- LÓGICA DE FORMULARIO Y SUBMIT ---
      document
        .getElementById("pedidoForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const submitBtn = document.getElementById("submitBtn");
          const submitText = document.getElementById("submitText");
          const submitSpinner = document.getElementById("submitSpinner");

          // Validaciones
          if (selectedProducts.length === 0) {
            showToast(
              "📦 Debes añadir al menos un producto al pedido.",
              "error"
            );
            return;
          }
          const cliente = document.getElementById("cliente").value.trim();
          const fecha = document.getElementById("fecha").value;
          if (!cliente || !fecha) {
            showToast(
              "📝 El nombre del cliente y la fecha de entrega son obligatorios.",
              "error"
            );
            return;
          }

          // Enviar
          submitBtn.disabled = true;
          submitText.textContent = "Guardando...";
          submitSpinner.classList.remove("hidden");

          try {
            // PASO 1: Crear productos temporales pendientes en el backend
            const productosTemporalesCreados = [];

            if (productosTemporalesPendientes.length > 0) {
              submitText.textContent = "Creando productos temporales...";

              for (const productoTemp of productosTemporalesPendientes) {
                try {
                  // Crear producto SIN marcarlo como temporal todavía
                  // (se marcará después de crear el pedido)
                  const response = await fetch(`${API_BASE}/productos`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      codigo: productoTemp.codigo,
                      nombre: productoTemp.nombre,
                      descripcion: productoTemp.descripcion,
                      id_categoria: productoTemp.id_categoria,
                      precio_unitario: productoTemp.precio_unitario,
                      largo_cm: productoTemp.largo_cm,
                      ancho_cm: productoTemp.ancho_cm,
                      alto_cm: productoTemp.alto_cm,
                      diametro_cm: productoTemp.diametro_cm,
                      fondo_cm: productoTemp.fondo_cm,
                      altura_asiento_cm: productoTemp.altura_asiento_cm,
                      altura_cubierta_cm: productoTemp.altura_cubierta_cm,
                      peso_kg: productoTemp.peso_kg,
                      material: productoTemp.material,
                      moneda: productoTemp.moneda,
                      incluye_iva: productoTemp.incluye_iva,
                      requiere_presupuesto: productoTemp.requiere_presupuesto,
                      unidad_venta: productoTemp.unidad_venta,
                      stock: productoTemp.stock,
                      notas_especiales: productoTemp.notas_especiales,
                      // NO enviar es_temporal ni id_pedido_origen todavía
                    }),
                  });

                  if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(
                      errorData.error ||
                        `Error al crear producto temporal "${productoTemp.nombre}"`
                    );
                  }

                  const result = await response.json();
                  productosTemporalesCreados.push({
                    tempId: productoTemp.id_producto,
                    realId: result.producto_id,
                    cantidad: productoTemp.cantidad,
                  });
                } catch (error) {
                  throw new Error(
                    `Error al crear producto temporal: ${error.message}`
                  );
                }
              }
            }

            // PASO 2: Preparar lista de productos (temporales ya creados + permanentes)
            submitText.textContent = "Creando pedido...";

            const productosParaPedido = selectedProducts.map((p) => {
              // Si es temporal, usar el ID real creado
              if (p.es_temporal_pendiente) {
                const tempCreado = productosTemporalesCreados.find(
                  (t) => t.tempId === p.id_producto
                );
                return {
                  id_producto: tempCreado.realId,
                  cantidad: tempCreado.cantidad,
                };
              }
              // Si es permanente, usar su ID original
              return {
                id_producto: p.id_producto,
                cantidad: p.cantidad,
              };
            });

            const pedidoData = {
              cliente: cliente,
              fecha: fecha,
              email: document.getElementById("email").value.trim(),
              telefono: document.getElementById("telefono").value.trim(),
              etiquetas: document.getElementById("etiquetas").value.trim(),
              comentarios: document.getElementById("comentarios").value.trim(),
              productos: productosParaPedido,
            };

            // PASO 3: Crear el pedido
            const authHeaders = getAuthHeaders();
            console.log("🔐 Headers de autenticación:", authHeaders);
            console.log("👤 Usuario actual:", getUsuarioActual());

            const response = await fetch(`${API_BASE}/pedidos`, {
              method: "POST",
              headers: authHeaders,
              body: JSON.stringify(pedidoData),
            });

            if (!response.ok) {
              const errorData = await response.json();
              let errorMsg = errorData.error || "No se pudo crear el pedido";

              // Agregar contexto al error
              if (errorMsg.includes("producto")) {
                errorMsg = "❌ " + errorMsg;
              } else if (errorMsg.includes("fecha")) {
                errorMsg = "📅 " + errorMsg;
              } else {
                errorMsg = "❌ " + errorMsg;
              }

              throw new Error(errorMsg);
            }

            const result = await response.json();
            const pedidoId = result.pedido_id;

            // PASO 4: Actualizar productos temporales con el id_pedido_origen
            if (productosTemporalesCreados.length > 0) {
              submitText.textContent = "Finalizando...";

              // Actualizar cada producto temporal con el pedido creado
              for (const tempProd of productosTemporalesCreados) {
                try {
                  await fetch(`${API_BASE}/productos/${tempProd.realId}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      id_pedido_origen: pedidoId,
                      es_temporal: true,
                    }),
                  });
                } catch (error) {
                  console.warn(
                    `No se pudo actualizar producto temporal ${tempProd.realId}:`,
                    error
                  );
                  // No bloqueamos el flujo si falla esta actualización
                }
              }
            }

            // Mostrar mensaje de éxito
            let mensajeExito = `Pedido #${pedidoId} creado exitosamente.`;
            if (productosTemporalesCreados.length > 0) {
              mensajeExito += ` ${productosTemporalesCreados.length} producto(s) temporal(es) guardado(s).`;
            }
            showToast(mensajeExito, "success");

            // Resetear formulario y estado
            selectedProducts = [];
            productosTemporalesPendientes = [];
            renderSelectedProducts();
            e.target.reset();
            document
              .getElementById("fecha")
              .setAttribute("min", new Date().toISOString().split("T")[0]);
          } catch (error) {
            console.error("Error al enviar pedido:", error);
            showToast(error.message, "error", 6000);
          } finally {
            submitBtn.disabled = false;
            submitText.textContent = "Crear Pedido";
            submitSpinner.classList.add("hidden");
          }
        });

      // --- EVENT LISTENERS ---
      function inicializarListeners() {
        const searchInput = document.getElementById("product-search");
        const resultsContainer = document.getElementById("search-results");
        const toggleButton = document.getElementById("toggle-product-list");
        const telefonoInput = document.getElementById("telefono");

        // Búsqueda de productos
        searchInput.addEventListener("input", () => {
          const query = searchInput.value.toLowerCase();
          if (query.length < 2) {
            resultsContainer.classList.add("hidden");
            return;
          }
          const filtered = allProducts.filter(
            (p) =>
              p.nombre.toLowerCase().includes(query) ||
              (p.codigo && p.codigo.toLowerCase().includes(query))
          );
          renderSearchResults(filtered);
        });

        // Toggle lista de productos
        toggleButton.addEventListener("click", () => {
          if (resultsContainer.classList.contains("hidden")) {
            renderSearchResults(allProducts);
          } else {
            resultsContainer.classList.add("hidden");
          }
        });

        // Ocultar resultados si se hace clic fuera
        document.addEventListener("click", (e) => {
          if (
            !searchInput.contains(e.target) &&
            !resultsContainer.contains(e.target) &&
            !toggleButton.contains(e.target)
          ) {
            resultsContainer.classList.add("hidden");
          }
        });

        // Validación teléfono
        telefonoInput.addEventListener("input", () => {
          const warning = document.getElementById("telefono-warning");
          if (/[^0-9]/.test(telefonoInput.value)) {
            warning.classList.remove("hidden");
          } else {
            warning.classList.add("hidden");
          }
        });

        // Fecha mínima
        document
          .getElementById("fecha")
          .setAttribute("min", new Date().toISOString().split("T")[0]);

        // --- EVENT LISTENERS PARA NUEVA CATEGORÍA ---
        document
          .getElementById("toggle-nueva-categoria")
          .addEventListener("click", mostrarNuevaCategoria);
        document
          .getElementById("guardar-categoria")
          .addEventListener("click", guardarNuevaCategoria);
        document
          .getElementById("cancelar-categoria")
          .addEventListener("click", ocultarNuevaCategoria);

        // Enter para guardar, Escape para cancelar
        document
          .getElementById("nueva-categoria-input")
          .addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              guardarNuevaCategoria();
            } else if (e.key === "Escape") {
              ocultarNuevaCategoria();
            }
          });

        // Render inicial
        renderSelectedProducts();
      }

      // --- NOTIFICACIONES TOAST ---
      function showToast(message, type = "info", duration = 4000) {
        const toast = document.createElement("div");

        // Colores según el tipo
        let bgColor = "bg-blue-600";
        let icon = "ℹ️";

        if (type === "success") {
          bgColor = "bg-green-600";
          icon = "✓";
        } else if (type === "error") {
          bgColor = "bg-red-600";
          icon = "✕";
        } else if (type === "warning") {
          bgColor = "bg-yellow-600";
          icon = "⚠";
        }

        toast.className = `fixed top-20 right-5 z-50 px-4 py-3 rounded-lg shadow-enterprise text-white transform translate-x-full transition-all duration-300 max-w-md ${bgColor}`;

        toast.innerHTML = `
          <div class="flex items-start gap-3">
            <div class="text-lg font-bold flex-shrink-0 mt-0.5">
              ${icon}
            </div>
            <div class="font-medium text-sm leading-relaxed">${message}</div>
          </div>
        `;

        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.transform = "translateX(0)";
        }, 100);

        setTimeout(() => {
          toast.style.transform = "translateX(100%)";
          setTimeout(() => toast.remove(), 300);
        }, duration);
      }

      // --- MANEJO DEL MODAL ---
      function abrirModal() {
        document.getElementById("product-modal").classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      function cerrarModal() {
        document.getElementById("product-modal").classList.add("hidden");
        document.body.style.overflow = "auto";
        document.getElementById("product-form").reset();
      }

      // --- ENVIAR NUEVO PRODUCTO ---
      async function crearProducto(e) {
        e.preventDefault();

        // Obtener el tipo de producto (permanente o temporal)
        const tipoProducto = document.querySelector(
          'input[name="tipo-agregado"]:checked'
        ).value;
        const esTemporal = tipoProducto === "temporal";

        const formData = {
          codigo: document.getElementById("prod-codigo").value.trim() || null,
          nombre: document.getElementById("prod-nombre").value.trim(),
          descripcion:
            document.getElementById("prod-descripcion").value.trim() || null,
          id_categoria:
            parseInt(document.getElementById("prod-categoria").value) || null,
          precio_unitario:
            parseFloat(document.getElementById("prod-precio").value) || null,
          largo_cm:
            parseFloat(document.getElementById("prod-largo").value) || null,
          ancho_cm:
            parseFloat(document.getElementById("prod-ancho").value) || null,
          alto_cm:
            parseFloat(document.getElementById("prod-alto").value) || null,
          diametro_cm:
            parseFloat(document.getElementById("prod-diametro").value) || null,
          fondo_cm:
            parseFloat(document.getElementById("prod-fondo").value) || null,
          altura_asiento_cm:
            parseFloat(document.getElementById("prod-altura-asiento").value) ||
            null,
          altura_cubierta_cm:
            parseFloat(document.getElementById("prod-altura-cubierta").value) ||
            null,
          peso_kg:
            parseFloat(document.getElementById("prod-peso").value) || null,
          material:
            document.getElementById("prod-material").value.trim() || null,
          moneda: document.getElementById("prod-moneda").value,
          incluye_iva: document.getElementById("prod-incluye-iva").checked,
          requiere_presupuesto: document.getElementById(
            "prod-requiere-presupuesto"
          ).checked,
          unidad_venta:
            document.getElementById("prod-unidad").value.trim() || "unidad",
          stock: parseInt(document.getElementById("prod-stock").value) || null,
          notas_especiales:
            document.getElementById("prod-notas").value.trim() || null,
        };

        // Validación básica
        if (!formData.nombre) {
          showToast("📝 El nombre del producto es obligatorio", "error", 4000);
          return;
        }

        const saveBtn = document.getElementById("save-product");
        const originalText = saveBtn.innerHTML;
        saveBtn.disabled = true;
        saveBtn.innerHTML =
          '<div class="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent mx-auto"></div>';

        try {
          // --- PRODUCTOS TEMPORALES: No se guardan en BD todavía ---
          if (esTemporal) {
            // Crear un ID temporal único
            const tempId = `temp_${Date.now()}`;

            // Crear objeto de producto temporal
            const productoTemporal = {
              ...formData,
              id_producto: tempId,
              es_temporal_pendiente: true,
              cantidad: 1,
            };

            // Guardar en array de pendientes
            productosTemporalesPendientes.push(productoTemporal);

            // Agregar a productos seleccionados
            selectedProducts.push(productoTemporal);
            renderSelectedProducts();

            cerrarModal();
            showToast(
              "Producto temporal agregado. Se guardará al crear el pedido.",
              "success",
              4000
            );

            saveBtn.disabled = false;
            saveBtn.innerHTML = originalText;
            return; // No hacer llamada a la API
          }

          // --- PRODUCTOS PERMANENTES: Guardar inmediatamente ---
          const response = await fetch(`${API_BASE}/productos`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              ...formData,
              es_temporal: false, // ✅ Marcar explícitamente como permanente
            }),
          });

          const result = await response.json();

          if (!response.ok) {
            // Manejo específico de errores del backend
            let errorMessage = result.error || "Error al crear el producto";

            // Agregar íconos y formato según el tipo de error
            switch (result.code) {
              case "DUPLICATE_CODE":
                errorMessage = "⚠️ " + errorMessage;
                break;
              case "DUPLICATE_NAME":
                errorMessage = "⚠️ " + errorMessage;
                break;
              case "VALIDATION_ERROR":
              case "EMPTY_NAME":
                errorMessage = "📝 " + errorMessage;
                break;
              case "INVALID_CATEGORY":
                errorMessage = "🗂️ " + errorMessage;
                break;
              case "INVALID_PRICE":
                errorMessage = "💰 " + errorMessage;
                break;
              case "DATABASE_ERROR":
              default:
                errorMessage = "❌ " + errorMessage;
                break;
            }

            throw new Error(errorMessage);
          }

          // Éxito - verificar si hay advertencia
          if (result.warning) {
            showToast("⚠️ " + result.message, "warning", 5000);
          } else {
            showToast(
              "Producto agregado exitosamente al catálogo y al pedido",
              "success",
              5000
            );
          }

          // Cerrar modal primero para mejor UX
          cerrarModal();

          // Recargar productos
          await cargarProductos();

          // Agregar automáticamente el producto recién creado al pedido
          if (result.producto_id) {
            // Buscar el producto recién creado en la lista actualizada
            const nuevoProducto = allProducts.find(
              (p) => p.id_producto === result.producto_id
            );

            if (nuevoProducto) {
              // Verificar que no esté ya en la lista (por si acaso)
              if (
                !selectedProducts.some(
                  (p) => p.id_producto === nuevoProducto.id_producto
                )
              ) {
                selectedProducts.push({ ...nuevoProducto, cantidad: 1 });
                renderSelectedProducts();
              }
            }
          }
        } catch (error) {
          console.error("Error al crear producto:", error);
          // El mensaje ya viene formateado del backend
          showToast(error.message, "error", 6000);
        } finally {
          saveBtn.disabled = false;
          saveBtn.innerHTML = originalText;
        }
      }

      // --- INICIALIZACIÓN ---
      document.addEventListener("DOMContentLoaded", () => {
        cargarProductos();
        cargarCategorias();
        inicializarListeners();

        // Listeners del modal
        document
          .getElementById("add-product-btn")
          .addEventListener("click", abrirModal);
        document
          .getElementById("close-modal")
          .addEventListener("click", cerrarModal);
        document
          .getElementById("cancel-product")
          .addEventListener("click", cerrarModal);
        document
          .getElementById("product-form")
          .addEventListener("submit", crearProducto);

        // Cerrar modal al hacer clic fuera
        document
          .getElementById("product-modal")
          .addEventListener("click", (e) => {
            if (e.target.id === "product-modal") {
              cerrarModal();
            }
          });
      });
    </script>

    <script src="./header-inline.js"></script>
    <script src="./menu-inline.js?v=5"></script>
  </body>
</html>
