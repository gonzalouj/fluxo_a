<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingreso de Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Paleta empresarial moderna */
      :root {
        --primary-blue: #1e40af;
        --primary-blue-light: #3b82f6;
        --success-green: #059669;
        --success-green-light: #10b981;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-600: #475569;
        --gray-700: #334155;
        --gray-800: #1e293b;
        --gray-900: #0f172a;
      }

      .enterprise-bg {
        background: linear-gradient(135deg, var(--gray-50) 0%, #ffffff 100%);
      }

      /* Inputs profesionales */
      .professional-input {
        background: white;
        border: 1px solid var(--gray-200);
        transition: all 0.2s ease;
      }

      .professional-input:focus {
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.05);
        outline: none;
      }

      /* Resultados de búsqueda que aparecen DEBAJO */
      .search-results {
        position: static; /* Cambiado de absolute a static */
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid var(--gray-200);
        border-radius: 8px;
        background: white;
        margin-top: 8px;
      }

      .product-item {
        transition: all 0.15s ease;
      }

      .product-item:hover {
        background-color: var(--gray-50);
        border-left: 3px solid var(--primary-blue);
      }

      .selected-product {
        background: white;
        border: 1px solid var(--gray-200);
        border-left: 4px solid var(--primary-blue);
      }

      .selected-product:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* Botón principal empresarial verde */
      .btn-enterprise {
        background: var(--success-green);
        transition: all 0.2s ease;
      }

      .btn-enterprise:hover {
        background: #047857;
        box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
      }

      /* Botón secundario */
      .btn-secondary {
        background: var(--gray-600);
        transition: all 0.2s ease;
      }

      .btn-secondary:hover {
        background: var(--gray-700);
      }

      /* Sombras empresariales */
      .shadow-enterprise {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .shadow-subtle {
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1),
          0 1px 2px 0 rgba(0, 0, 0, 0.06);
      }

      /* Títulos profesionales */
      .title-enterprise {
        color: var(--gray-800);
        font-weight: 600;
      }

      .label-enterprise {
        color: var(--gray-700);
        font-weight: 500;
      }

      /* Animación sutil */
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="enterprise-bg min-h-screen">
    <div id="toast-container" class="fixed top-5 right-5 z-50"></div>
    <div id="menu-placeholder"></div>
    <div id="header-placeholder"></div>

    <main class="max-w-4xl mx-auto py-8 px-4">
      <div
        class="bg-white rounded-lg shadow-enterprise border border-gray-200 fade-in"
      >
        <form id="pedidoForm" class="p-6 space-y-6">
          <!-- Sección Productos -->
          <div class="space-y-4">
            <label class="block text-lg label-enterprise">Productos</label>
            <div>
              <div class="flex items-center gap-3">
                <input
                  type="text"
                  id="product-search"
                  placeholder="Buscar por nombre o código..."
                  class="flex-grow px-4 py-3 professional-input rounded-lg"
                />
                <button
                  type="button"
                  id="toggle-product-list"
                  class="px-4 py-3 btn-secondary text-white rounded-lg hover:shadow-subtle"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 9l-7 7-7-7"
                    ></path>
                  </svg>
                </button>
              </div>
              <div id="search-results" class="search-results hidden">
                <!-- Resultados de búsqueda se mostrarán aquí -->
              </div>
            </div>
            <div id="selected-products" class="space-y-3 pt-4">
              <!-- Productos seleccionados se añadirán aquí -->
            </div>
          </div>

          <!-- Sección Cliente -->
          <div class="space-y-4">
            <label class="block text-lg label-enterprise">Cliente</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label
                  for="cliente"
                  class="block text-sm font-medium text-gray-600 mb-1"
                  >Nombre Cliente *</label
                >
                <input
                  type="text"
                  name="cliente"
                  id="cliente"
                  required
                  class="w-full px-4 py-3 professional-input rounded-lg"
                />
              </div>
              <div>
                <label
                  for="fecha"
                  class="block text-sm font-medium text-gray-600 mb-1"
                  >Fecha de Entrega *</label
                >
                <input
                  type="date"
                  name="fecha"
                  id="fecha"
                  required
                  class="w-full px-4 py-3 professional-input rounded-lg"
                />
              </div>
              <div>
                <label
                  for="email"
                  class="block text-sm font-medium text-gray-600 mb-1"
                  >Email (opcional)</label
                >
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="w-full px-4 py-3 professional-input rounded-lg"
                />
              </div>
              <div>
                <label
                  for="telefono"
                  class="block text-sm font-medium text-gray-600 mb-1"
                  >Teléfono (opcional)</label
                >
                <input
                  type="text"
                  name="telefono"
                  id="telefono"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  class="w-full px-4 py-3 professional-input rounded-lg"
                />
                <p
                  id="telefono-warning"
                  class="text-xs text-red-500 mt-1 hidden"
                >
                  Solo se admiten números.
                </p>
              </div>
            </div>
          </div>

          <!-- Sección Detalles Adicionales -->
          <div class="space-y-4">
            <label class="block text-lg label-enterprise"
              >Detalles Adicionales</label
            >
            <div>
              <label
                for="etiquetas"
                class="block text-sm font-medium text-gray-600 mb-1"
                >Etiquetas (separadas por coma)</label
              >
              <input
                type="text"
                name="etiquetas"
                id="etiquetas"
                placeholder="Ej: Urgente, Despacho, Diseño especial"
                class="w-full px-4 py-3 professional-input rounded-lg"
              />
            </div>
            <div>
              <label
                for="comentarios"
                class="block text-sm font-medium text-gray-600 mb-1"
                >Comentario Inicial (opcional)</label
              >
              <textarea
                name="comentarios"
                id="comentarios"
                rows="3"
                placeholder="Añadir un comentario sobre el pedido..."
                class="w-full px-4 py-3 professional-input rounded-lg resize-none"
              ></textarea>
            </div>
          </div>

          <div class="pt-6 border-t border-gray-200">
            <button
              type="submit"
              id="submitBtn"
              class="w-full flex justify-center items-center gap-3 px-6 py-3 btn-enterprise text-white font-semibold rounded-lg focus:outline-none focus:ring-4 focus:ring-green-200"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5 13l4 4L19 7"
                ></path>
              </svg>
              <span id="submitText">Crear Pedido</span>
              <div
                id="submitSpinner"
                class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"
              ></div>
            </button>
          </div>
        </form>
      </div>
    </main>

    <script>
      // ESTADO GLOBAL
      // Detect if the current origin is NOT the Go backend (e.g., when served by VS Code Live Server on port 5500)
      const API_BASE =
        window.location.port === "8080" ? "/api" : "/api";
      let allProducts = [];
      let selectedProducts = [];

      // --- RENDERIZADO ---
      function renderSelectedProducts() {
        const container = document.getElementById("selected-products");
        if (selectedProducts.length === 0) {
          container.innerHTML =
            '<p class="text-sm text-gray-500 italic text-center">Aún no has añadido productos.</p>';
          return;
        }
        container.innerHTML = selectedProducts
          .map(
            (p) => `
            <div class="selected-product p-4 rounded-lg flex items-center justify-between gap-4">
                <div class="flex-grow">
                    <p class="font-semibold text-gray-800">${p.nombre}</p>
                    <p class="text-sm text-gray-600">${new Intl.NumberFormat(
                      "es-CL",
                      { style: "currency", currency: "CLP" }
                    ).format(p.precio_unitario)} c/u</p>
          </div>
                <div class="flex items-center gap-2">
                    <label for="cantidad-${
                      p.id_producto
                    }" class="text-sm font-medium">Cant:</label>
                    <input type="number" id="cantidad-${
                      p.id_producto
                    }" value="${p.cantidad}" min="1" onchange="updateQuantity(${
              p.id_producto
            }, this.value)" class="w-20 text-center bg-white border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
          </div>
                <button type="button" onclick="removeProduct(${
                  p.id_producto
                })" class="p-1 text-red-500 hover:text-red-700 hover:bg-red-100 rounded-full transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
          </button>
        </div>
        `
          )
          .join("");
      }

      function renderSearchResults(products) {
        const resultsContainer = document.getElementById("search-results");
        resultsContainer.classList.remove("hidden");
        if (products.length === 0) {
          resultsContainer.innerHTML =
            '<p class="p-4 text-sm text-gray-500">No se encontraron productos.</p>';
          return;
        }
        resultsContainer.innerHTML = products
          .map(
            (p) => `
            <div onclick="selectProduct(${
              p.id_producto
            })" class="product-item px-4 py-3 cursor-pointer border-b border-gray-200 last:border-b-0">
                <p class="font-medium text-gray-800">${p.nombre}</p>
                <p class="text-sm text-gray-500">${p.codigo || "Sin código"}</p>
            </div>
        `
          )
          .join("");
      }

      // --- LÓGICA DE PRODUCTOS ---
      function selectProduct(productId) {
        if (selectedProducts.some((p) => p.id_producto === productId)) {
          showToast("Este producto ya ha sido añadido.", "info");
          return;
        }
        const product = allProducts.find((p) => p.id_producto === productId);
        if (product) {
          selectedProducts.push({ ...product, cantidad: 1 });
          renderSelectedProducts();
          document.getElementById("product-search").value = "";
          document.getElementById("search-results").classList.add("hidden");
        }
      }

      function removeProduct(productId) {
        selectedProducts = selectedProducts.filter(
          (p) => p.id_producto !== productId
        );
        renderSelectedProducts();
      }

      function updateQuantity(productId, newQuantity) {
        const quantity = parseInt(newQuantity, 10);
        if (isNaN(quantity) || quantity < 1) {
          const input = document.getElementById(`cantidad-${productId}`);
          if (input) input.value = 1;
          const product = selectedProducts.find(
            (p) => p.id_producto === productId
          );
          if (product) product.cantidad = 1;
          return;
        }
        const product = selectedProducts.find(
          (p) => p.id_producto === productId
        );
        if (product) {
          product.cantidad = quantity;
        }
      }

      // --- CARGA INICIAL ---
      async function cargarProductos() {
        try {
          const response = await fetch(`${API_BASE}/productos`);
          if (!response.ok)
            throw new Error(
              "No se pudieron cargar los productos desde el servidor."
            );
          const data = await response.json();
          allProducts = data.productos || [];
        } catch (error) {
          console.error("Error:", error);
          showToast(error.message, "error");
        }
      }

      // --- LÓGICA DE FORMULARIO Y SUBMIT ---
      document
        .getElementById("pedidoForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const submitBtn = document.getElementById("submitBtn");
          const submitText = document.getElementById("submitText");
          const submitSpinner = document.getElementById("submitSpinner");

          // Validaciones
          if (selectedProducts.length === 0) {
            showToast("Debes añadir al menos un producto.", "error");
            return;
          }
          const cliente = document.getElementById("cliente").value.trim();
          const fecha = document.getElementById("fecha").value;
          if (!cliente || !fecha) {
            showToast(
              "El nombre del cliente y la fecha de entrega son obligatorios.",
              "error"
            );
            return;
          }

          // Preparar datos
          const pedidoData = {
            cliente: cliente,
            fecha: fecha,
            email: document.getElementById("email").value.trim(),
            telefono: document.getElementById("telefono").value.trim(),
            etiquetas: document.getElementById("etiquetas").value.trim(),
            comentarios: document.getElementById("comentarios").value.trim(),
            productos: selectedProducts.map((p) => ({
              id_producto: p.id_producto,
              cantidad: p.cantidad,
            })),
          };

          // Enviar
          submitBtn.disabled = true;
          submitText.textContent = "Guardando...";
          submitSpinner.classList.remove("hidden");

          try {
            const response = await fetch(`${API_BASE}/pedidos`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(pedidoData),
            });

            if (!response.ok) {
              const errorData = await response.json();
              throw new Error(
                errorData.error || "Error desconocido al crear el pedido."
              );
            }

            const result = await response.json();
            showToast(
              `Pedido #${result.pedido_id} creado exitosamente.`,
              "success"
            );

            // Resetear formulario
            selectedProducts = [];
            renderSelectedProducts();
            e.target.reset();
            document
              .getElementById("fecha")
              .setAttribute("min", new Date().toISOString().split("T")[0]);
          } catch (error) {
            console.error("Error al enviar pedido:", error);
            showToast(error.message, "error");
          } finally {
            submitBtn.disabled = false;
            submitText.textContent = "Crear Pedido";
            submitSpinner.classList.add("hidden");
          }
        });

      // --- EVENT LISTENERS ---
      function inicializarListeners() {
        const searchInput = document.getElementById("product-search");
        const resultsContainer = document.getElementById("search-results");
        const toggleButton = document.getElementById("toggle-product-list");
        const telefonoInput = document.getElementById("telefono");

        // Búsqueda de productos
        searchInput.addEventListener("input", () => {
          const query = searchInput.value.toLowerCase();
          if (query.length < 2) {
            resultsContainer.classList.add("hidden");
            return;
          }
          const filtered = allProducts.filter(
            (p) =>
              p.nombre.toLowerCase().includes(query) ||
              (p.codigo && p.codigo.toLowerCase().includes(query))
          );
          renderSearchResults(filtered);
        });

        // Toggle lista de productos
        toggleButton.addEventListener("click", () => {
          if (resultsContainer.classList.contains("hidden")) {
            renderSearchResults(allProducts);
          } else {
            resultsContainer.classList.add("hidden");
          }
        });

        // Ocultar resultados si se hace clic fuera
        document.addEventListener("click", (e) => {
          if (
            !searchInput.contains(e.target) &&
            !resultsContainer.contains(e.target) &&
            !toggleButton.contains(e.target)
          ) {
            resultsContainer.classList.add("hidden");
          }
        });

        // Validación teléfono
        telefonoInput.addEventListener("input", () => {
          const warning = document.getElementById("telefono-warning");
          if (/[^0-9]/.test(telefonoInput.value)) {
            warning.classList.remove("hidden");
          } else {
            warning.classList.add("hidden");
          }
        });

        // Fecha mínima
        document
          .getElementById("fecha")
          .setAttribute("min", new Date().toISOString().split("T")[0]);

        // Render inicial
        renderSelectedProducts();
      }

      // --- NOTIFICACIONES TOAST ---
      function showToast(message, type = "info", duration = 4000) {
        const toast = document.createElement("div");
        toast.className = `fixed top-20 right-5 z-50 px-4 py-3 rounded-lg shadow-enterprise text-white transform translate-x-full transition-all duration-300 ${
          type === "success"
            ? "bg-green-600"
            : type === "error"
            ? "bg-red-600"
            : "bg-blue-600"
        }`;

        toast.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="text-sm font-bold">
              ${type === "success" ? "✓" : type === "error" ? "✕" : "i"}
            </div>
            <div class="font-medium text-sm">${message}</div>
          </div>
        `;

        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.transform = "translateX(0)";
        }, 100);

        setTimeout(() => {
          toast.style.transform = "translateX(100%)";
          setTimeout(() => toast.remove(), 300);
        }, duration);
      }

      // --- INICIALIZACIÓN ---
      document.addEventListener("DOMContentLoaded", () => {
        cargarProductos();
        inicializarListeners();
      });
    </script>

    <script src="./header-inline.js"></script>
    <script src="./menu-inline.js"></script>
  </body>
</html>
