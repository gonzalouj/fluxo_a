<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Pedidos</title>
  
  <!-- Tailwind vía CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

  <div class="max-w-3xl mx-auto space-y-8">

    <!-- Encabezado -->
    <header class="text-center">
      <h1 class="text-3xl font-bold text-green-600">Gestión de Pedidos</h1>
      <p class="text-gray-600">Ingreso manual y vista general</p>
    </header>

    <!-- Formulario -->
    <section class="bg-white shadow rounded-lg p-6">
      <h2 class="text-xl font-semibold mb-4">Ingresar Pedido</h2>
      <form id="pedidoForm" class="space-y-4">
        
        <!-- Producto -->
        <div>
          <label class="block mb-1 font-medium">Nombre del Producto *</label>
          <input type="text" name="producto" required 
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Cantidad -->
        <div>
          <label class="block mb-1 font-medium">Cantidad *</label>
          <input type="number" name="cantidad" min="1" required
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Cliente -->
        <div>
          <label class="block mb-1 font-medium">Nombre Cliente *</label>
          <input type="text" name="cliente" required
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Fecha -->
        <div>
          <label class="block mb-1 font-medium">Fecha de Entrega *</label>
          <input type="date" name="fecha" required
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Email -->
        <div>
          <label class="block mb-1 font-medium">Correo Electrónico (opcional)</label>
          <input type="email" name="email"
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Etiquetas -->
        <div>
          <label class="block mb-1 font-medium">Etiquetas</label>
          <input type="text" name="etiquetas" placeholder="Ej: urgente, madera"
                 class="w-full p-2 border rounded focus:ring focus:ring-blue-300" />
        </div>

        <!-- Botón -->
        <button type="submit" 
                class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
          Guardar Pedido
        </button>
      </form>
    </section>

    <!-- Vista General -->
    <section class="bg-white shadow rounded-lg p-6">
      <h2 class="text-xl font-semibold mb-4">Vista General de Pedidos</h2>
      <ul id="listaPedidos" class="space-y-3 text-gray-700">
        <li class="text-gray-400 italic">Aún no hay pedidos ingresados.</li>
      </ul>
    </section>

  </div>

  <!-- Script para conectar con backend -->
  <script>
    const form = document.getElementById('pedidoForm');
    const listaPedidos = document.getElementById('listaPedidos');
    const API_BASE = 'http://localhost:8080/api';

    // Cargar pedidos al iniciar la página
    document.addEventListener('DOMContentLoaded', cargarPedidos);

    async function cargarPedidos() {
      try {
        const response = await fetch(`${API_BASE}/pedidos`);
        if (!response.ok) throw new Error('Error al cargar pedidos');
        
        const data = await response.json();
        const pedidos = data.pedidos || [];
        
        if (pedidos.length === 0) {
          listaPedidos.innerHTML = '<li class="text-gray-400 italic">Aún no hay pedidos ingresados.</li>';
          return;
        }
        
        listaPedidos.innerHTML = '';
        pedidos.forEach(pedido => {
          const li = document.createElement('li');
          li.className = "p-3 border rounded bg-gray-50";
          
          li.innerHTML = `
            <p><span class="font-semibold">ID:</span> ${pedido.id_pedido}</p>
            <p><span class="font-semibold">Cliente:</span> ${pedido.nombre_cliente}</p>
            <p><span class="font-semibold">Entrega:</span> ${pedido.fecha_entrega}</p>
            <p><span class="font-semibold">Estado:</span> 
               <span class="px-2 py-1 text-xs rounded ${pedido.estado === 'Pendiente' ? 'bg-yellow-200' : 'bg-green-200'}">
                 ${pedido.estado}
               </span>
            </p>
            ${pedido.email_cliente ? `<p><span class="font-semibold">Email:</span> ${pedido.email_cliente}</p>` : ""}
          `;
          
          listaPedidos.appendChild(li);
        });
        
      } catch (error) {
        console.error('Error:', error);
        listaPedidos.innerHTML = '<li class="text-red-500">Error al cargar pedidos. Verifica que el backend esté ejecutándose.</li>';
      }
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      // Obtener datos
      const producto = form.producto.value.trim();
      const cantidad = parseInt(form.cantidad.value);
      const cliente = form.cliente.value.trim();
      const fecha = form.fecha.value;
      const email = form.email.value.trim();
      const etiquetas = form.etiquetas.value.trim();

      // Validación básica
      if (!producto || !cantidad || !cliente || !fecha) {
        alert("Por favor complete todos los campos obligatorios.");
        return;
      }

      try {
        // Enviar al backend
        const response = await fetch(`${API_BASE}/pedidos`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            producto,
            cantidad,
            cliente,
            fecha,
            email: email || '',
            etiquetas: etiquetas || ''
          })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Error al crear pedido');
        }

        const result = await response.json();
        
        // Mostrar mensaje de éxito
        alert(`✅ ${result.message} (ID: ${result.pedido_id})`);
        
        // Resetear formulario
        form.reset();
        
        // Recargar lista de pedidos
        await cargarPedidos();
        
      } catch (error) {
        console.error('Error:', error);
        alert(`❌ Error: ${error.message}`);
      }
    });
  </script>

</body>
</html>
