<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .status-pendiente { 
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
    }
    .status-listo { 
      background: linear-gradient(135deg, #10b981, #059669);
    }
    .status-cancelado { 
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }
    .pedido-card {
      transition: all 0.2s ease;
    }
    .pedido-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
  <div id="menu-placeholder"></div>
  <div id="header-placeholder"></div>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <div id="loading" class="flex justify-center items-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
    </div>

    <div id="lista-pedidos" class="space-y-4 hidden"></div>

    <div id="empty-state" class="hidden text-center py-12">
      <div class="text-gray-400 mb-4">
        <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
      </div>
      <p class="text-gray-500 text-lg">No hay pedidos disponibles</p>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8080/api';

    const listaEl = document.getElementById('lista-pedidos');
    const loadingEl = document.getElementById('loading');
    const emptyStateEl = document.getElementById('empty-state');

    function getStatusClass(estado) {
      const estados = { 'pendiente': 'status-pendiente', 'listo': 'status-listo', 'cancelado': 'status-cancelado' };
      const normalized = (estado || '').toLowerCase();
      return estados[normalized] || 'bg-gray-500';
    }

    function formatDate(fecha) {
      if (!fecha) return 'Sin fecha';
      try { return new Date(fecha).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
      catch { return fecha; }
    }

    function capitalize(v) { return v ? v.charAt(0).toUpperCase() + v.slice(1) : ''; }
    function formatCLPNoSep(value) {
      if (value == null || value === '') return '$0';
      const n = Number(value);
      if (Number.isNaN(n)) return `$${value}`;
      return `$${Math.round(n)}`;
    }

    function renderPedidoCard(pedido) {
      const estado = pedido.estado || 'Pendiente';
      const statusClass = getStatusClass(estado);
      const fechaFormateada = formatDate(pedido.fecha_entrega);
      const productosHtml = (pedido.productos && pedido.productos.length > 0)
        ? `<div class="space-y-2">
            <h3 class="text-sm font-medium text-gray-700 mb-2">Productos:</h3>
            <div class="bg-gray-50 rounded-xl p-3">
              ${pedido.productos.map(prod => {
                const precio = typeof prod.precio_unitario === 'number' ? formatCLPNoSep(prod.precio_unitario) : formatCLPNoSep(prod.precio_unitario);
                const cantidad = prod.cantidad || 0;
                const nombre = prod.producto || 'Producto sin nombre';
                return `
                  <div class="flex justify-between items-center py-1">
                    <span class="text-sm text-gray-800 flex-1">${nombre}</span>
                    <span class="text-sm text-gray-600 ml-2">x${cantidad} • ${precio}</span>
                  </div>`;
              }).join('')}
            </div>
          </div>`
        : `<div class="text-center py-4">
            <svg class="w-8 h-8 text-gray-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2 2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
            </svg>
            <p class="text-gray-400 text-sm italic">Sin productos asociados</p>
          </div>`;

      const nombreCliente = (pedido.nombre_cliente || 'Cliente sin nombre').toUpperCase();

      return `
        <div class="pedido-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="flex items-center p-4 pb-3">
            <div class="w-4 h-4 rounded-full ${statusClass} mr-3 flex-shrink-0"></div>
            <div class="flex-1 min-w-0">
              <h2 class="text-lg md:text-xl font-semibold text-gray-900 truncate">${nombreCliente}</h2>
            </div>
            <span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-600 ml-2 flex-shrink-0">${capitalize(estado)}</span>
          </div>
          <div class="px-4 pb-4">
            <div class="flex items-center text-sm text-gray-600 mb-3">
              <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3a4 4 0 118 0v4m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>
              </svg>
              <span>Entrega: ${fechaFormateada}</span>
            </div>
            ${productosHtml}
          </div>
        </div>`;
    }

    async function cargarPedidos() {
      try {
        const res = await fetch(`${API_BASE}/pedidos`);
        if (!res.ok) throw new Error('Error al cargar pedidos');
        const data = await res.json();
        const pedidos = data.pedidos || [];
        loadingEl.classList.add('hidden');
        if (pedidos.length === 0) { emptyStateEl.classList.remove('hidden'); listaEl.classList.add('hidden'); return; }
        listaEl.innerHTML = pedidos.map(renderPedidoCard).join('');
        listaEl.classList.remove('hidden');
        emptyStateEl.classList.add('hidden');
      } catch (e) {
        loadingEl.classList.add('hidden');
        listaEl.innerHTML = `<div class="text-center py-12"><div class="text-red-400 mb-4"><svg class=\"w-16 h-16 mx-auto\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"1\" d=\"M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.19 2.5 1.732 2.5z\"></path></svg></div><p class=\"text-red-500 text-lg font-medium\">Error de conexión</p><p class=\"text-gray-500 text-sm mt-1\">No se pudo conectar con el servidor</p></div>`;
        listaEl.classList.remove('hidden');
        emptyStateEl.classList.add('hidden');
        console.error(e);
      }
    }

    document.addEventListener('DOMContentLoaded', cargarPedidos);
  </script>
  <script src="./header-inline.js"></script>
  <script src="./pedidos.js"></script>
  <script src="./menu-inline.js"></script>
</body>
</html>
