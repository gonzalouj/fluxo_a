version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: fluxo-postgres
    environment:
      POSTGRES_DB: fluxo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_unificado.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - fluxo-network

  # Backend Go
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fluxo-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fluxo
      DB_USER: postgres
      DB_PASSWORD: postgres123
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - fluxo-network
    restart: unless-stopped

  # Frontend con Caddy
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fluxo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fluxo-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  fluxo-network:
    driver: bridge