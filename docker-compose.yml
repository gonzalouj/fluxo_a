services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: fluxo-postgres
    environment:
      POSTGRES_DB: fluxo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5006:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_unificado_new.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      red_taller_software:
    restart: unless-stopped

  # Backend Go (sirve el Frontend también)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fluxo-backend
    environment:
      PORT: 4006
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fluxo
      DB_USER: postgres
      DB_PASSWORD: postgres123
      GIN_MODE: release
      # Para producción, configurar BASE_URL con la URL real
      # BASE_URL: https://tu-dominio.com
    depends_on:
      - postgres
    ports:
      - "4006:4006"
    networks:
      red_taller_software:
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  red_taller_software:
    external: true