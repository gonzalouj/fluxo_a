services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: fluxo-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-fluxo_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5006:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_fluxo_inicial.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped
    networks:
      - red_taller_software

  # Backend Go
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fluxo-backend
    env_file:
      - .env
    environment:
      PORT: 4006
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fluxo_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      GIN_MODE: ${GIN_MODE:-debug}
      BASE_URL: ${BASE_URL:-http://localhost}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@fluxo.cl}
    depends_on:
      - postgres
    ports:
      - "4006:4006"
    restart: unless-stopped
    networks:
      - red_taller_software

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fluxo-frontend
    depends_on:
      - backend
    ports:
      - "3006:3006"
    restart: unless-stopped
    networks:
      - red_taller_software

  # Proxy Caddy
  proxy:
    image: caddy:2-alpine
    container_name: fluxo-proxy
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend
    networks:
      - red_taller_software

volumes:
  postgres_data:

networks:
  red_taller_software:
    driver: bridge
